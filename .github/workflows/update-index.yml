name: Update repo index

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'
  push:
    branches: ['main']

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build public repo index
        env:
          OWNER: yanivmizrachiy
          TOKEN: ${{ secrets.REPO_INDEX_TOKEN }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const owner = process.env.OWNER;
          const token = process.env.TOKEN || process.env.GITHUB_TOKEN;
          const headers = {Accept:'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28','User-Agent':'repo-index'};
          if (token) headers.Authorization = `Bearer ${token}`;
          async function api(url){const r=await fetch(url,{headers}); if(!r.ok) throw new Error(await r.text()); return r.json();}
          async function exists(repo,p){const ref=repo.default_branch||'main'; const enc=p.split('/').map(encodeURIComponent).join('/'); const r=await fetch(`https://api.github.com/repos/${repo.full_name}/contents/${enc}?ref=${ref}`,{headers}); return r.status===200;}
          (async()=>{
            let all=[];
            for(let page=1;;page++){
              const batch=await api(`https://api.github.com/user/repos?affiliation=owner&per_page=100&page=${page}&sort=pushed&direction=desc`);
              all.push(...batch.filter(r=>r.owner.login===owner));
              if(batch.length<100) break;
            }
            const publicRepos=all.filter(r=>!r.private);
            const privateHidden=all.length-publicRepos.length;
            const repos=[];
            for(const r of publicRepos){
              const flags=[];
              for(const p of ['README.md','PROJECT_RULES.md','RULES.md','docs','STATE','.github/workflows','package.json']) if(await exists(r,p)) flags.push(p);
              repos.push({name:r.name,url:r.html_url,language:r.language||'',pushed_at:r.pushed_at,summary_he:'אין עדיין תיאור עברי מאומת.',exists_he:flags.join(', ')||'לא זוהו רכיבים מרכזיים.',notes_he:''});
            }
            fs.mkdirSync('data',{recursive:true});
            fs.writeFileSync('data/index.json',JSON.stringify({generated_at:new Date().toISOString(),private_hidden:privateHidden,repositories:repos},null,2));
            fs.mkdirSync('STATE',{recursive:true});
            fs.writeFileSync('STATE/LAST_RUN.json',JSON.stringify({ok:true,generated_at:new Date().toISOString(),visible:repos.length,private_hidden:privateHidden},null,2));
          })().catch(e=>{console.error(e);process.exit(1)});
          NODE
      - name: Commit data
        run: |
          git config user.name repo-index-bot
          git config user.email repo-index-bot@users.noreply.github.com
          git add data STATE
          git diff --cached --quiet || (git commit -m 'Update repo index' && git push)
